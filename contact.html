<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<body style="background-color: lavender;">

<header class="navbar">
  <div class="logo">HRLN Tourism</div>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="destinations.html">Destinations</a>
    <a href="packages.html">Packages</a>

  </nav>
  <button class="btn">Book Now</button>

<!-- HERO -->
<section class="hero" >
  <div>
    <h1>Contact Us</h1>
    <p>Plan your Andhra Pradesh journey with us</p>
  </div>
</section>

<!-- CONTACT SECTION -->
<section class="section">
  <h2 class="section-title">Get in Touch</h2>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:40px;">


    <form style="display:flex; flex-direction:column; gap:15px;">
      <input type="text" placeholder="Your Name" required style="padding:12px; border-radius: 10px;">
      <input type="email" placeholder="Your Email" required style="padding:12px; border-radius: 10px;">
      <input type="tel" placeholder="Phone Number" style="padding:12px; border-radius: 10px;">
      <input type="text" placeholder="Destination of Interest" style="padding:12px; border-radius: 10px;">
      <textarea placeholder="Your Message" rows="5" style="padding:12px; border-radius: 10px;"></textarea>
      <button class="btn">Send Message</button>
    </form>


    <div>
      <h3>Contact Information</h3>
      <p><strong>Location:</strong> Andhra Pradesh, India</p>
      <p><strong>Phone:</strong> +91 98765 43210</p>
      <p><strong>Email:</strong> info@hrlntourism.com</p>
      <p><strong>Working Hours:</strong> 9 AM – 6 PM</p>

      <br>


      <iframe 
        src="https://maps.google.com/maps?q=andhra%20pradesh&t=&z=6&ie=UTF8&iwloc=&output=embed"
        width="100%" height="250" style="border:0;">
      </iframe>
    </div>

  </div>
</section>
<script>

  const images = [
    "fimg3.webp",
    "img1.webp",
    "img2.webp",
    "img3.webp",
    "img4.webp",
    "img5.webp",
    "img6.webp",
    "img7.webp",
    "img8.webp",
    "img9.webp",
    
  ];
  

  const hero = document.querySelector(".hero");

  const randomImage = images[Math.floor(Math.random() * images.length)];

  hero.style.background = `url('${randomImage}') center/cover no-repeat`;
</script>




</body>
</html>
